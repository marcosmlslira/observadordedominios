services:
  frontend:
    image: observadordedominios-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.observadordedominios.com.br
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  backend:
    image: observadordedominios-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_FORCE_PATH_STYLE=false
      - CORS_ORIGINS=https://observadordedominios.com.br,https://www.observadordedominios.com.br
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MATCH_LLM_ASSESSMENT_ENABLED=false
      - SEED_LLM_GENERATION_ENABLED=true
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  postgres:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    environment:
      - POSTGRES_USER=obs
      - POSTGRES_PASSWORD=obs
      - POSTGRES_DB=obs
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: 15432
        protocol: tcp
        mode: host
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  ingestion_worker:
    image: observadordedominios-ingestion:latest
    command: ["python", "scheduler.py"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=observadordedominios
      - R2_PREFIX=lake/domain_ingestion
      - CZDS_USERNAME=${CZDS_USERNAME:-}
      - CZDS_PASSWORD=${CZDS_PASSWORD:-}
      - CZDS_TLDS=all
      - DATABRICKS_HOST=${DATABRICKS_HOST:-}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN:-}
      - DATABRICKS_WORKSPACE_PATH=/ingestion/notebooks
      - INGESTION_GIT_REF=main
      - OPENINTEL_TLDS=ac,br,uk,de,fr,se,nu,ch,li,sk,ee
      - OPENINTEL_ZONEFILE_TLDS=ch,ee,fr,li,nu,se,sk
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  similarity_worker:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.similarity_worker"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - SIMILARITY_SCAN_CRON=0 9 * * *
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

networks:
  app-network:
    driver: overlay

volumes:
  pgdata:
