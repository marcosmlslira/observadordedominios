services:
  frontend:
    image: observadordedominios-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.observadordedominios.com.br
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  backend:
    image: observadordedominios-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_FORCE_PATH_STYLE=false
      - CORS_ORIGINS=https://observadordedominios.com.br,https://www.observadordedominios.com.br
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MATCH_LLM_ASSESSMENT_ENABLED=false
      - SEED_LLM_GENERATION_ENABLED=true
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  postgres:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    environment:
      - POSTGRES_USER=obs
      - POSTGRES_PASSWORD=obs
      - POSTGRES_DB=obs
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: 15432
        protocol: tcp
        mode: host
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  czds_ingestor:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.czds_ingestor"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_FORCE_PATH_STYLE=false
      - CZDS_RUNNING_STALE_MINUTES=480
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  certstream_server:
    image: 0rickyy0/certstream-server-go:latest
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  ct_ingestor:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.ct_ingestor"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - CT_CERTSTREAM_ENABLED=true
      - CT_CERTSTREAM_URL=ws://certstream_server:8080/
      - CT_CRTSH_ENABLED=true
      - CT_CRTSH_SYNC_CRON=0 5 * * *
    networks:
      - app-network
    depends_on:
      - postgres
      - certstream_server
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  openintel_ingestor:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.openintel_ingestor"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - OPENINTEL_ENABLED_TLDS=br,uk,de,fr,au,ca,nl,eu
      - OPENINTEL_SYNC_CRON=0 13 * * *
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

  similarity_worker:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.similarity_worker"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - SIMILARITY_SCAN_CRON=0 9 * * *
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 0
        window: 120s

networks:
  app-network:
    driver: overlay

volumes:
  pgdata:
