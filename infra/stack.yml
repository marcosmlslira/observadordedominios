services:
  frontend:
    image: observadordedominios-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.observadordedominios.com.br
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: observadordedominios-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_FORCE_PATH_STYLE=false
      - CORS_ORIGINS=https://observadordedominios.com.br,https://www.observadordedominios.com.br
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=obs
      - POSTGRES_PASSWORD=obs
      - POSTGRES_DB=obs
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  czds_ingestor:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.czds_ingestor"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_FORCE_PATH_STYLE=false
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  certstream_server:
    image: 0rickyy0/certstream-server-go:latest
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ct_ingestor:
    image: observadordedominios-backend:latest
    command: ["python", "-m", "app.worker.ct_ingestor"]
    environment:
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - CT_CERTSTREAM_ENABLED=true
      - CT_CERTSTREAM_URL=ws://certstream_server:8080/
      - CT_CRTSH_ENABLED=true
      - CT_CRTSH_SYNC_CRON=0 5 * * *
    networks:
      - app-network
    depends_on:
      - postgres
      - certstream_server
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay

volumes:
  pgdata:
