services:
  frontend:
    image: observadordedominios-frontend:dev
    ports:
      - "3005:3000"
    volumes:
      - c:\PROJETOS\observadordedominios\frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
      - NEXT_PUBLIC_API_URL=http://localhost:8005
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  backend:
    image: observadordedominios-backend:dev
    ports:
      - "8005:8000"
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
      - zonedata:/data
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_FORCE_PATH_STYLE=true
      - CZDS_ENABLED_TLDS=com,net,org,xyz,online,site,store,top,info,tech,space,website,fun,club,vip,icu,live,digital,world,today,email,solutions,services,support,group,company,center,zone,agency,systems,network,works,tools,io,ai,dev,app,cloud,software,co,biz,shop,sale,deals,market,finance,financial,money,credit,loan,bank,capital,fund,exchange,trading,pay,cash,us,uk,ca,au,de,fr,es,it,nl,eu,asia,news,media,blog,press,link,click,one,pro,name,life,plus,now,global,expert,academy,education,school,host,hosting,domains,security,safe,protect,chat,social,community,team,studio,design,marketing,consulting,partners,ventures,holdings,international
      - ADMIN_EMAIL=admin@observador.com
      - ADMIN_PASSWORD_HASH=$$2b$$12$$yO4Ti.ntPbWQKbl7cdADq.TbSjmfZjy/DMZmjZnjOUCRUy2vySexy
      - JWT_SECRET_KEY=2bf766374633ad9e9a92e5d23497fceb12904caa608439bdc6d01b0feaae4fe7
      - CORS_ORIGINS=http://localhost:3005,http://localhost:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MATCH_LLM_ASSESSMENT_ENABLED=false
      - SEED_LLM_GENERATION_ENABLED=false
    networks:
      - app-network
    depends_on:
      - postgres
      - minio
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  postgres:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=32MB
      -c random_page_cost=1.1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=obs
      - POSTGRES_PASSWORD=obs
      - POSTGRES_DB=obs
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  czds_ingestor:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
      - zonedata:/data
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - S3_BUCKET=observador-zones
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_FORCE_PATH_STYLE=true
      - CZDS_USERNAME=marcosmlslira@gmail.com
      - CZDS_PASSWORD=mls1509TI@,,2099
      - CZDS_ENABLED_TLDS=com,net,org,xyz,online,site,store,top,info,tech,space,website,fun,club,vip,icu,live,digital,world,today,email,solutions,services,support,group,company,center,zone,agency,systems,network,works,tools,io,ai,dev,app,cloud,software,co,biz,shop,sale,deals,market,finance,financial,money,credit,loan,bank,capital,fund,exchange,trading,pay,cash,us,uk,ca,au,de,fr,es,it,nl,eu,asia,news,media,blog,press,link,click,one,pro,name,life,plus,now,global,expert,academy,education,school,host,hosting,domains,security,safe,protect,chat,social,community,team,studio,design,marketing,consulting,partners,ventures,holdings,international
      - CZDS_SYNC_CRON=0 17 * * *
      - CZDS_FORCE_COOLDOWN_HOURS=24
      - CZDS_RUNNING_STALE_MINUTES=480
    command: ["python", "-m", "app.worker.czds_ingestor"]
    networks:
      - app-network
    depends_on:
      - postgres
      - minio
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  certstream_server:
    image: 0rickyy0/certstream-server-go:latest
    volumes:
      - c:\PROJETOS\observadordedominios\infra\certstream-config.yaml:/app/config.yaml
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ct_ingestor:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - CT_CERTSTREAM_ENABLED=true
      - CT_CERTSTREAM_URL=ws://certstream_server:8080/
      - CT_CRTSH_ENABLED=true
      - CT_CRTSH_SYNC_CRON=0 5 * * *
      - CT_BUFFER_FLUSH_SIZE=5000
      - CT_BUFFER_FLUSH_SECONDS=30
    command: ["python", "-m", "app.worker.ct_ingestor"]
    networks:
      - app-network
    depends_on:
      - postgres
      - certstream_server
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  openintel_ingestor:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      # Controlled local testing: only fr, 1 day lookback, no CZDS conflict guard needed locally
      - OPENINTEL_ENABLED_TLDS=fr
      - OPENINTEL_S3_BUCKET=openintel-public
      - OPENINTEL_S3_ENDPOINT=https://object.openintel.nl
      - OPENINTEL_S3_PREFIX=fdns/basis=zonefile/
      - OPENINTEL_S3_QNAME_COLUMN=query_name
      - OPENINTEL_MAX_LOOKBACK_DAYS=1
      - OPENINTEL_SYNC_CRON=0 13 * * *
    command: ["python", "-m", "app.worker.openintel_ingestor"]
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  health_worker:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - HEALTH_CHECK_CRON=0 6 * * *
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    command: ["python", "-m", "app.worker.health_worker"]
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  scan_worker:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - SIMILARITY_SCAN_CRON=0 9 * * *
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    command: ["python", "-m", "app.worker.scan_worker"]
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  enrichment_worker:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - ENRICHMENT_CRON=0 12 * * *
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    command: ["python", "-m", "app.worker.enrichment_worker"]
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  assessment_worker:
    image: observadordedominios-backend:dev
    volumes:
      - c:\PROJETOS\observadordedominios\backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://obs:obs@postgres:5432/obs
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MATCH_LLM_ASSESSMENT_ENABLED=false
      - SEED_LLM_GENERATION_ENABLED=false
    command: ["python", "-m", "app.worker.assessment_worker"]
    networks:
      - app-network
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay

volumes:
  pgdata:
  miniodata:
  zonedata:
